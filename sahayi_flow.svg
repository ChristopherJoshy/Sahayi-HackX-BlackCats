<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>
  <style>
    .wave {
      stroke: url(#grad);
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 6s linear infinite;
    }
    .pulse {
      animation: pulse-anim 2s infinite ease-in-out;
      transform-origin: center;
    }
    .grid {
      stroke: #1e293b;
      stroke-width: 0.5;
    }
    .text-title {
      font-family: 'Fira Code', monospace;
      font-weight: bold;
      fill: #22d3ee;
      letter-spacing: 2px;
    }
    .text-sub {
      font-family: 'Fira Code', monospace;
      fill: #64748b;
    }
    @keyframes draw {
      0% {
        stroke-dashoffset: 1000;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }
    @keyframes pulse-anim {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.8)); }
    }
  </style>
  
  <!-- Background panel -->
  <rect width="100%" height="100%" fill="#090d16" rx="12" />
  
  <!-- Grid layout for futuristic medical screen look -->
  <line x1="0" y1="50" x2="800" y2="50" class="grid" />
  <line x1="0" y1="100" x2="800" y2="100" class="grid" />
  <line x1="0" y1="150" x2="800" y2="150" class="grid" />
  <line x1="200" y1="0" x2="200" y2="200" class="grid" />
  <line x1="400" y1="0" x2="400" y2="200" class="grid" />
  <line x1="600" y1="0" x2="600" y2="200" class="grid" />

  <!-- Animated Sound/Heart Wave -->
  <path class="wave" d="M 10,120 L 100,120 L 120,70 L 140,160 L 160,120 L 250,120 Q 280,60 310,120 T 370,120 L 450,120 L 465,30 L 485,180 L 505,120 L 580,120 Q 610,170 640,120 T 700,120 L 790,120" />
  
  <!-- Pulsing sensor overlay nodes -->
  <circle cx="130" cy="115" r="5" fill="#22d3ee" class="pulse" />
  <circle cx="475" cy="105" r="5" fill="#f97316" class="pulse" />
  
  <text x="50%" y="35" text-anchor="middle" class="text-title" font-size="14">SAHAYI ORCHESTRATOR TELEMETRY</text>
  <text x="50%" y="180" text-anchor="middle" class="text-sub" font-size="11">ACTIVE CHANNEL: TELEPHONY VOIP | VAD LATENCY MASKING RUNNING (hmmm...)</text>
</svg>
